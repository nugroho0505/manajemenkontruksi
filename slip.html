<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Slip Gaji Karyawan - A5</title>
    <style>
        @page { size: A5 portrait; margin: 10mm; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; background-color: #e9ecef; color: #2c3e50; line-height: 1.4; font-size: 12px; }
        *, *::before, *::after { box-sizing: border-box; }
        .a5-container { max-width: 148mm; min-height: 210mm; margin: 0 auto; background-color: #fdfbf7; padding: 12mm; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        @media print { body { background-color: #fdfbf7; padding: 0; } .a5-container { max-width: 100%; margin: 0; padding: 0; box-shadow: none; } }
        
        .header { display: table; width: 100%; border-bottom: 2px solid #34495e; padding-bottom: 10px; margin-bottom: 15px; }
        .header-left, .header-right { display: table-cell; width: 50%; vertical-align: middle; }
        .header-right { text-align: right; }
        .header-right h1 { font-size: 1.4em; margin: 0; color: #34495e; }
        .logo-img { max-width: 150px; max-height: 70px; object-fit: contain; display: block; }
        
        .info-section { margin-bottom: 15px; background: #ffffff; padding: 10px; border: 1px solid #bdc3c7; border-left: 4px solid #34495e; border-radius: 4px; display: flex; flex-direction: column; gap: 5px; }
        .info-row { display: table; width: 100%; }
        .label { display: table-cell; width: 35%; font-weight: bold; }
        .value { display: table-cell; width: 65%; }

        h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 3px; margin-top: 15px; font-size: 1.1em; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; background: #fff; }
        th { background-color: #34495e; color: white; padding: 6px 8px; text-align: left; font-size: 0.9em; }
        td { padding: 6px 8px; border-bottom: 1px solid #ecf0f1; font-size: 0.9em; }
        .amount { text-align: right; font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        .subtotal-row td { background-color: #f9f9f9; font-weight: bold; border-top: 1px solid #bdc3c7; }

        .summary-box { margin-top: 20px; padding: 12px; background: #ecf0f1; border-radius: 4px; border-left: 4px solid #27ae60; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; }
        .summary-label { font-size: 1em; font-weight: bold; }
        .summary-value { font-size: 1.2em; font-family: 'Courier New', Courier, monospace; font-weight: bold; color: #27ae60; }
        .terbilang-box { margin-top: 10px; padding: 8px 10px; background-color: #fff; border: 1px dashed #bdc3c7; font-style: italic; color: #333; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="a5-container">
        <div class="header">
            <div class="header-left"><img src="logo.png" alt="Logo" class="logo-img"></div>
            <div class="header-right">
                <h1>SLIP GAJI</h1>
                <p style="margin:2px 0 0 0; color:#7f8c8d; font-size: 0.9em;">Periode: <span id="val_periode">-</span></p>
            </div>
        </div>

        <div class="info-section">
            <div class="info-row"><span class="label">ID Karyawan</span><span class="value">: <span id="val_id_karyawan">-</span></span></div>
            <div class="info-row"><span class="label">Nama Lengkap</span><span class="value">: <span id="val_nama_karyawan">-</span></span></div>
            <div class="info-row"><span class="label">Jabatan</span><span class="value">: <span id="val_jabatan">-</span></span></div>
            <div class="info-row"><span class="label">Jenis Pajak</span><span class="value">: <span id="val_jenis_pajak">-</span></span></div>
        </div>

        <h2 style="color: #27ae60;">Penerimaan</h2>
        <table>
            <thead><tr><th>Keterangan</th><th style="text-align: right; width: 40%;">Nominal (Rp)</th></tr></thead>
            <tbody id="val_list_pendapatan"></tbody>
            <tbody><tr class="subtotal-row"><td>Total Penerimaan</td><td class="amount" id="val_total_pendapatan" style="color: #27ae60;">0</td></tr></tbody>
        </table>

        <h2 style="color: #c0392b;">Potongan</h2>
        <table>
            <thead><tr><th>Keterangan</th><th style="text-align: right; width: 40%;">Nominal (Rp)</th></tr></thead>
            <tbody id="val_list_potongan"></tbody>
            <tbody><tr class="subtotal-row"><td>Total Potongan</td><td class="amount" id="val_total_potongan" style="color: #c0392b;">0</td></tr></tbody>
        </table>

        <div class="summary-box">
            <div class="summary-row">
                <span class="summary-label">TOTAL GAJI (NETTO)</span>
                <span class="summary-value" id="val_gaji_bersih">0</span>
            </div>
            <div class="terbilang-box">
                <strong>Terbilang: </strong> <span id="val_terbilang" style="text-transform: capitalize;">-</span>
            </div>
        </div>
    </div>
<script>
    function cleanNumber(str) {
        if (!str) return 0;
        // Menghapus titik, spasi, dan karakter lain agar menjadi angka murni
        return parseInt(str.toString().replace(/[^0-9-]/g, '')) || 0;
    }

    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID').format(angka);
    }

    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);

        // Isi data header
        document.getElementById('val_periode').innerText = urlParams.get('periode') || '-';
        document.getElementById('val_id_karyawan').innerText = urlParams.get('id_karyawan') || '-';
        document.getElementById('val_nama_karyawan').innerText = urlParams.get('nama_karyawan') || '-';
        document.getElementById('val_jabatan').innerText = urlParams.get('jabatan') || '-';
        document.getElementById('val_jenis_pajak').innerText = urlParams.get('jenis_pajak') || '-';

        // Isi data total
        document.getElementById('val_total_pendapatan').innerText = formatRupiah(cleanNumber(urlParams.get('total_pendapatan')));
        document.getElementById('val_total_potongan').innerText = formatRupiah(cleanNumber(urlParams.get('total_potongan')));
        document.getElementById('val_gaji_bersih').innerText = formatRupiah(cleanNumber(urlParams.get('gaji_bersih')));

        // Render List (Ditambah .replace(/\s*,\s*/g, ',') untuk membuang spasi di sekitar koma)
        function renderList(param, targetId, isPotongan) {
            if (urlParams.has(param)) {
                let raw = decodeURIComponent(urlParams.get(param));
                let cleanStr = raw.replace(/\s*,\s*/g, ','); // Hapus spasi di sekitar koma
                let rows = cleanStr.split(',');
                let html = '';
                rows.forEach(r => {
                    let cols = r.split('|');
                    if(cols.length >= 2) {
                        let val = cleanNumber(cols[1]);
                        html += `<tr><td>${cols[0].trim()}</td><td class="amount" ${isPotongan ? 'style="color:#c0392b;"' : ''}>${isPotongan ? '('+formatRupiah(val)+')' : formatRupiah(val)}</td></tr>`;
                    }
                });
                document.getElementById(targetId).innerHTML = html;
            }
        }

        renderList('list_pendapatan', 'val_list_pendapatan', false);
        renderList('list_potongan', 'val_list_potongan', true);
        
        // Terbilang
        if(urlParams.has('gaji_bersih')) {
            document.getElementById('val_terbilang').innerText = terbilang(cleanNumber(urlParams.get('gaji_bersih')));
        }
    });
</script>
</body>
</html>
