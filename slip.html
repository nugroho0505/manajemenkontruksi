<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Slip Gaji Karyawan</title>
    <style>
        @page { size: A5 portrait; margin: 10mm; }
        body { font-family: sans-serif; font-size: 12px; background: #eee; }
        .a5-container { max-width: 148mm; margin: 0 auto; background: #fff; padding: 10mm; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #ccc; padding: 5px; text-align: left; }
        .amount { text-align: right; font-family: monospace; }
        .total { font-weight: bold; background: #f4f4f4; }
    </style>
</head>
<body>
    <div class="a5-container">
        <h2>SLIP GAJI - <span id="val_periode">-</span></h2>
        <p>Nama: <span id="val_nama_karyawan"></span> | ID: <span id="val_id_karyawan"></span></p>

        <h3>Penerimaan</h3>
        <table>
            <thead><tr><th>Keterangan</th><th>Nominal</th></tr></thead>
            <tbody id="val_list_pendapatan"></tbody>
            <tr class="total"><td>Total Penerimaan</td><td class="amount" id="val_total_pendapatan"></td></tr>
        </table>

        <h3>Potongan</h3>
        <table>
            <thead><tr><th>Keterangan</th><th>Nominal</th></tr></thead>
            <tbody id="val_list_potongan"></tbody>
            <tr class="total"><td>Total Potongan</td><td class="amount" id="val_total_potongan"></td></tr>
        </table>

        <p><strong>GAJI BERSIH: <span id="val_gaji_bersih"></span></strong></p>
        <p><i>Terbilang: <span id="val_terbilang"></span></i></p>
    </div>

    <script>
        function formatRupiah(n) { return new Intl.NumberFormat('id-ID').format(n); }
        function clean(s) { return parseInt(s.toString().replace(/[^0-9]/g, '')) || 0; }
        
        // Fungsi Terbilang sederhana
        function terbilang(n) {
            const b = ["", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "delapan", "sembilan", "sepuluh", "sebelas"];
            if (n < 12) return " " + b[n];
            if (n < 20) return terbilang(n - 10) + " belas";
            if (n < 100) return terbilang(Math.floor(n / 10)) + " puluh" + terbilang(n % 10);
            if (n < 200) return " seratus" + terbilang(n - 100);
            if (n < 1000) return terbilang(Math.floor(n / 100)) + " ratus" + terbilang(n % 100);
            if (n < 1000000) return terbilang(Math.floor(n / 1000)) + " ribu" + terbilang(n % 1000);
            return terbilang(Math.floor(n / 1000000)) + " juta" + terbilang(n % 1000000);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            
            // Isi header
            document.getElementById('val_periode').innerText = params.get('periode');
            document.getElementById('val_nama_karyawan').innerText = params.get('nama_karyawan');
            document.getElementById('val_id_karyawan').innerText = params.get('id_karyawan');
            
            // Isi total
            document.getElementById('val_total_pendapatan').innerText = formatRupiah(clean(params.get('total_pendapatan')));
            document.getElementById('val_total_potongan').innerText = formatRupiah(clean(params.get('total_potongan')));
            document.getElementById('val_gaji_bersih').innerText = formatRupiah(clean(params.get('gaji_bersih')));
            document.getElementById('val_terbilang').innerText = terbilang(clean(params.get('gaji_bersih'))) + " Rupiah";

            // Fungsi render tabel yang lebih stabil
            function render(p, id) {
                if(!params.has(p)) return;
                let rows = decodeURIComponent(params.get(p)).split(',');
                let html = '';
                rows.forEach(r => {
                    let c = r.split('|');
                    if(c.length >= 2) html += `<tr><td>${c[0]}</td><td class="amount">${formatRupiah(clean(c[1]))}</td></tr>`;
                });
                document.getElementById(id).innerHTML = html;
            }

            render('list_pendapatan', 'val_list_pendapatan');
            render('list_potongan', 'val_list_potongan');
        };
    </script>
</body>
</html>
