<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Laporan Kontrak Subcon</title>
    <style>
        @page { size: A4; margin: 20mm; }
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .a4-container { max-width: 210mm; margin: 0 auto; background: #fff; padding: 20mm; box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-height: 297mm; }
        .header { display: flex; align-items: center; border-bottom: 3px solid #34495e; padding-bottom: 15px; margin-bottom: 25px; }
        .logo-img { max-width: 120px; margin-right: 20px; }
        .header-text { flex-grow: 1; text-align: right; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; padding: 15px; background: #f8f9fa; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #34495e; color: #fff; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .amount { text-align: right; font-family: monospace; font-weight: bold; }
        .summary-box { margin-top: 30px; padding: 20px; background: #ecf0f1; border-radius: 4px; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; color: #c0392b; }
        .terbilang-box { margin-top: 15px; padding: 15px; background: #fff; border-left: 4px solid #f39c12; font-style: italic; }
    </style>
</head>
<body>
    <div class="a4-container">
        <div class="header">
            <img src="logo.png" alt="Logo" class="logo-img">
            <div class="header-text">
                <h1 style="margin:0; color:#34495e;">LAPORAN KONTRAK</h1>
                <p id="val_no_kontrak" style="margin:0; font-weight:bold;"></p>
            </div>
        </div>

        <div class="info-grid">
            <div><strong>Proyek:</strong> <span id="val_proyek">-</span></div>
            <div><strong>Subcon:</strong> <span id="val_nama_subcon">-</span></div>
            <div><strong>Jenis Pajak:</strong> <span id="val_jenis_pajak">-</span></div>
        </div>

        <h3>Rincian Nilai Kontrak</h3>
        <table>
            <thead><tr><th>Deskripsi</th><th class="amount">Jumlah (Rp)</th></tr></thead>
            <tbody>
                <tr><td>Nilai Kontrak Bruto (DPP)</td><td class="amount" id="val_nilai_bruto">0</td></tr>
                <tr><td>Potongan Pajak (PPh)</td><td class="amount" id="val_nilai_pph">0</td></tr>
                <tr style="background:#f9f9f9"><td><strong>Nilai Kontrak Bersih</strong></td><td class="amount" id="val_nilai_bersih">0</td></tr>
            </tbody>
        </table>

        <h3>Riwayat Pembayaran</h3>
        <table>
            <thead><tr><th>Tanggal</th><th>Keterangan</th><th class="amount">Jumlah</th></tr></thead>
            <tbody id="val_riwayat_pembayaran"></tbody>
        </table>

        <div class="summary-box">
            <div class="total-row"><span>SISA PEMBAYARAN:</span> <span id="val_sisa_pembayaran">0</span></div>
            <div class="terbilang-box" id="val_terbilang">-</div>
        </div>
    </div>
<script>
    function fmt(n) { 
        // Memastikan input adalah angka murni
        let val = parseFloat(n);
        return isNaN(val) ? "0" : new Intl.NumberFormat('id-ID').format(val); 
    }
    
    function terbilang(n) {
        const b = ["", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "delapan", "sembilan", "sepuluh", "sebelas"];
        if (n < 12) return " " + b[n];
        if (n < 20) return terbilang(n - 10) + " belas";
        if (n < 100) return terbilang(Math.floor(n / 10)) + " puluh" + terbilang(n % 10);
        if (n < 200) return " seratus" + terbilang(n - 100);
        if (n < 1000) return terbilang(Math.floor(n / 100)) + " ratus" + terbilang(n % 100);
        if (n < 1000000) return terbilang(Math.floor(n / 1000)) + " ribu" + terbilang(n % 1000);
        return terbilang(Math.floor(n / 1000000)) + " juta" + terbilang(n % 1000000);
    }
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    
    // Fungsi pembantu untuk mengambil data (Case Insensitive)
    function getVal(key) {
        for (let pair of params.entries()) {
            if (pair[0].toLowerCase() === key.toLowerCase()) return pair[1];
        }
        return null;
    }

    // 1. Set teks biasa (Proyek, Subcon, dll)
    document.getElementById('val_proyek').innerText = decodeURIComponent(getVal('proyek') || '-');
    document.getElementById('val_nama_subcon').innerText = decodeURIComponent(getVal('nama_subcon') || '-');
    document.getElementById('val_no_kontrak').innerText = decodeURIComponent(getVal('no_kontrak') || '-');
    document.getElementById('val_jenis_pajak').innerText = decodeURIComponent(getVal('jenis_pajak') || '-');

    // 2. Set Angka dengan "Paksa"
    // Kita cek semua variasi nama parameter
    const setNum = (id, keys) => {
        let val = 0;
        keys.forEach(k => { if(getVal(k)) val = getVal(k); });
        document.getElementById(id).innerText = fmt(val);
        return parseInt(val);
    };

    setNum('val_nilai_bruto', ['nilai_bruto', 'Nilai_Bruto']);
    setNum('val_nilai_pph', ['nilai_pph', 'Nilai_PPh']);
    setNum('val_nilai_bersih', ['nilai_bersih', 'Nilai_Bersih']);
    let sisa = setNum('val_sisa_pembayaran', ['sisa_pembayaran', 'Sisa_Pembayaran']);
    
    // Terbilang
    document.getElementById('val_terbilang').innerText = (sisa > 0) ? terbilang(sisa) + " Rupiah" : "-";
};
        // Terbilang
        let sisa = parseInt(params.get('sisa_pembayaran') || 0);
        document.getElementById('val_terbilang').innerText = terbilang(sisa) + " Rupiah";

        // Riwayat Pembayaran
        let riwayat = decodeURIComponent(params.get('riwayat_pembayaran') || "");
        let tbody = document.getElementById('val_riwayat_pembayaran');
        if (riwayat && riwayat.trim() !== "") {
            tbody.innerHTML = ""; // Bersihkan loading
            riwayat.split(',').forEach(r => {
                let c = r.split('|');
                if(c.length === 3) {
                    tbody.innerHTML += `<tr><td>${c[0]}</td><td>${c[1]}</td><td class="amount">${fmt(c[2])}</td></tr>`;
                }
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999;">Belum ada riwayat pembayaran</td></tr>';
        }
    };
</script>
</body>
</html>
